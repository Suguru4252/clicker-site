<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GitHub Pages → APK</title>

<style>
body{
font-family:sans-serif;
background:#111;
color:white;
text-align:center;
padding:40px;
}

input{
padding:10px;
margin:10px;
width:300px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>GitHub Pages → APK</h1>

<input id="name" placeholder="App name"><br>
<input id="url" placeholder="GitHub Pages URL"><br>
<input type="file" id="icon"><br>

<button onclick="build()">Create APK</button>

<p id="status"></p>

<script>

async function build(){

let name = document.getElementById("name").value
let url = document.getElementById("url").value
let icon = document.getElementById("icon").files[0]

let form = new FormData()

form.append("name",name)
form.append("url",url)
form.append("icon",icon)

document.getElementById("status").innerText="Building..."

let res = await fetch("/build",{
method:"POST",
body:form
})

let blob = await res.blob()

let a = document.createElement("a")
a.href = URL.createObjectURL(blob)
a.download = "app.apk"
a.click()

document.getElementById("status").innerText="Done!"

}

</script>

</body>
</html>
