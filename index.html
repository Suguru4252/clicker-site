<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rucoy Online - Полная версия</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <!-- UI кнопки -->
    <div class="vertical-buttons">
        <button class="v-btn super-btn" id="superBtn">🌟</button>
        <button class="v-btn hp-btn" id="hpBtn">❤️</button>
        <button class="v-btn mp-btn" id="mpBtn">💙</button>
    </div>
    <button class="corner-btn stats-btn" id="statsBtn">📊</button>
    <button class="corner-btn inventory-btn" id="inventoryBtn">🎒</button>
    
    <script src="game.js"></script>
</body>
</html>
